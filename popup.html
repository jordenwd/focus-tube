<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusTube</title>
    <link rel="stylesheet" href="/styles/popup.css" />
    <script src="scripts/popup.js" defer></script>
  </head>
  <body>
    <form id="focus-settings">
      <h2>Settings</h2>

      <label>
        <input
          type="checkbox"
          name="hideRelatedVideos"
          id="relatedVideosInput"
        />
        Hide related videos
      </label>
      <br />

      <label>
        <input type="checkbox" name="hideHomepageVideos" id="homepageInput" />
        Hide homepage videos
      </label>
      <br />

      <label>
        <input type="checkbox" name="hideComments" id="commentsInput" />
        Hide comments
      </label>
      <br />
      <br />
    </form>
    <button id="toggle-button">Enable focus</button>
  </body>
</html>
