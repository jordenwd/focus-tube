<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Tube</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        color: #333333;
      }

      header {
        background-color: #ff0000;
        color: #ffffff;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      header h1 {
        font-size: 18px;
        font-weight: bold;
      }

      .content {
        padding: 16px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .toggle-row label {
        font-size: 14px;
      }

      .toggle {
        position: relative;
        width: 42px;
        height: 24px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #cccccc;
        border-radius: 24px;
        transition: 0.3s;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        bottom: 3px;
        background-color: #ffffff;
        border-radius: 50%;
        transition: 0.3s;
      }

      input:checked + .slider {
        background-color: #ff0000;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
      }

      .status {
        font-size: 12px;
        color: #666666;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Focus Tube</h1>
    </header>
    <div class="content">
      <div class="toggle-row">
        <label for="enableToggle">Enable Focus Mode</label>
        <label class="toggle">
          <input type="checkbox" id="enableToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <label for="hideRecommended">Hide Recommended Videos</label>
        <label class="toggle">
          <input type="checkbox" id="hideRecommended" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <label for="hideComments">Hide Comments</label>
        <label class="toggle">
          <input type="checkbox" id="hideComments" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <label for="hideSidebar">Hide Sidebar</label>
        <label class="toggle">
          <input type="checkbox" id="hideSidebar" />
          <span class="slider"></span>
        </label>
      </div>
      <p class="status" id="status">Focus Tube is disabled.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
